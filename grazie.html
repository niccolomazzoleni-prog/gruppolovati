<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prenotazione ricevuta — Pizzeria Olltre</title>
  <link rel="icon" type="image/png" href="assets/logo-badge.png" />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Petit+Formal+Script&family=Bebas+Neue&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:          #14110D;
      --bg-2:        #1C1814;
      --cream:       #F4E9C8;
      --cream-dim:   rgba(244,233,200,.72);
      --gold:        #C9A66B;
      --gold-deep:   #8E6F3E;
      --line:        rgba(201,166,107,.18);
      --font-script:  'Petit Formal Script', cursive;
      --font-display: 'Cormorant Garamond', serif;
      --font-caps:    'Bebas Neue', sans-serif;
      --font-body:    'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: var(--font-body);
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 40px 24px;
      text-align: center;
    }
    .logo {
      width: 120px;
      margin-bottom: 48px;
      opacity: .9;
    }
    .check {
      width: 72px; height: 72px;
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      color: var(--gold);
      font-size: 32px;
    }
    h1 {
      font-family: var(--font-script);
      font-size: clamp(52px, 12vw, 80px);
      color: var(--gold);
      line-height: 1;
      margin-bottom: 20px;
    }
    p {
      font-family: var(--font-display);
      font-size: clamp(17px, 2.5vw, 20px);
      color: var(--cream-dim);
      max-width: 440px;
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .divider {
      width: 48px; height: 1px;
      background: var(--gold-deep);
      margin: 0 auto 40px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 4px;
      font-family: var(--font-caps);
      font-size: 15px;
      letter-spacing: .06em;
      text-decoration: none;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .8; }
    .btn-primary { background: var(--gold); color: var(--bg); }
    .btn-ghost   { border: 1px solid var(--line); color: var(--cream-dim); }
    .note {
      margin-top: 48px;
      font-size: 13px;
      color: rgba(244,233,200,.35);
      max-width: 360px;
    }
  </style>
</head>
<body>

  <img src="assets/logo.png" alt="Pizzeria Olltre" class="logo" />

  <div class="check">&#10003;</div>

  <h1>Grazie!</h1>

  <div class="divider"></div>

  <p>Abbiamo ricevuto la tua prenotazione.<br>Ti contatteremo a breve per confermare il tavolo.</p>

  <div class="actions">
    <a href="index.html" class="btn btn-primary">Torna alla home</a>
    <a href="tel:0451117173" class="btn btn-ghost">Chiamaci</a>
  </div>

  <p class="note">Controlla la tua email per il riepilogo. Se non la trovi, guarda nello spam.</p>

</body>
</html>
